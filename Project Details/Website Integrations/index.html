<script>
function openTab(evt, tabName) {
    var i, tabcontent, navitems;
    
    // Hide all content
    tabcontent = document.getElementsByClassName("tab-content");
    for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
        tabcontent[i].classList.remove("active-content");
    }

    // Deactivate all buttons
    navitems = document.getElementsByClassName("nav-item");
    for (i = 0; i < navitems.length; i++) {
        navitems[i].className = navitems[i].className.replace(" active", "");
    }

    // Show current tab
    const activeTab = document.getElementById(tabName);
    activeTab.style.display = "block";
    activeTab.classList.add("active-content");
    evt.currentTarget.className += " active";

    // Dynamic Title Update
    const titles = {
        'perf': ['EV Performance Analysis', 'Deep dive into charge efficiency and range metrics.'],
        'dash2': ['Indian Market Trends', 'Comparing international EV adoption and brand power.'],
        'dash3': ['India Infrastructure', 'Mapping charging station density across regions.'],
        'story': ['The Electric Story', 'Chronological evolution of EVs in the Indian market.']
    };
    document.getElementById('tab-title').innerText = titles[tabName][0];
    document.getElementById('tab-desc').innerText = titles[tabName][1];
}
</script>
